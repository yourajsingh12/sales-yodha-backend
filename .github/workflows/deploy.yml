name: 🚀 Deploy Spring Boot (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          port: 2222
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            APP_DIR="/root/salesyodha"

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d ".git" ]; then
              git reset --hard
              git pull origin main
            else
              git clone git@github.com:yourajsingh12/sales-yodha-backend.git .
            fi

            docker-compose down || true
            docker-compose up -d --build

            docker system prune -f

            echo "✅ Deployment Done"